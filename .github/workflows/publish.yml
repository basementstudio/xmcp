name: Publish Stable Release to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run Changesets versioning without publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.14.0]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dry run Changesets version
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "Manual stable publishing is disabled. Use dry_run=true."
            exit 1
          fi

          pnpm version-packages

          {
            echo "# Changesets Dry Run"
            echo
            echo "Ran \`pnpm version-packages\` without publishing."
            echo
            echo "## Resulting workspace changes"
            echo
            echo '```'
            git status --short
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create version PR or publish
        if: github.event_name == 'push'
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
