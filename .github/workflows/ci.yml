name: CI

on:
  pull_request:
    branches: [main, canary]

jobs:
  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - name: Build (needed for downstream typecheck)
        run: pnpm turbo build --filter=xmcp --filter=create-xmcp-app --filter=init-xmcp

      - name: Lint
        run: pnpm turbo lint --filter=xmcp --filter=create-xmcp-app --filter=init-xmcp

      - name: Typecheck (xmcp)
        run: pnpm typecheck

      - name: Prettier check
        run: pnpm prettier:check

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Skip windows-latest for now — slow + flaky on shared runners and
        # most xmcp users don't ship from Windows. Revisit if path-separator
        # bugs surface. The cross-platform.yml workflow still smokes the CLI
        # on Windows so we're not flying blind.
        os: [ubuntu-latest, macos-latest]
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - name: Build xmcp (integration tests need dist/cli.js)
        run: pnpm turbo build --filter=xmcp

      - name: Run tests
        run: pnpm test

  pack-check:
    name: Pack hygiene (no test files in tarball)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - name: Build xmcp
        run: pnpm turbo build --filter=xmcp

      - name: Inspect npm tarball
        working-directory: packages/xmcp
        run: |
          npm pack --dry-run --json > pack.json
          # Fail if any file path matches a test/fixture/config glob.
          LEAKED=$(jq -r '.[0].files[].path' pack.json | grep -E '(^|/)(test|__tests__|fixtures)/|\.test\.tsx?$|^vitest\.config\.' || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Test/fixture files leaked into the npm tarball:"
            echo "$LEAKED"
            exit 1
          fi
          echo "Tarball clean — no test files."

  coverage:
    # Required check. Vitest threshold violations exit non-zero and fail CI.
    # Floor in vitest.config.ts sits ~2 points below the captured baseline
    # (16.4 / 13.49 / 16 / 16.38) so a small unit-test refactor can dip
    # without breaking CI, but a real regression in unit-level coverage
    # still bites. Recapture and raise the floor when unit coverage rises.
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - name: Build xmcp
        run: pnpm turbo build --filter=xmcp

      - name: Run coverage
        working-directory: packages/xmcp
        run: pnpm test:coverage

  package-integrity:
    name: Package integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - name: Validate main package.json files
        run: |
          for pkg in packages/xmcp/package.json packages/create-xmcp-app/package.json packages/init-xmcp/package.json; do
            jq -e '.name' "$pkg" > /dev/null || { echo "Missing name in $pkg"; exit 1; }
            jq -e '.version' "$pkg" > /dev/null || { echo "Missing version in $pkg"; exit 1; }
          done
